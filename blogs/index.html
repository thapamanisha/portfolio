<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes & Stories — Manisha Thapa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #faf6f1; --bg-dark: #1c1a17;
  --accent: #c45c2e; --accent-2: #4a7c59; --gold: #c9a84c;
  --text: #2e2a25; --text-light: #7a7269; --text-muted: #a09890;
  --border: rgba(46,42,37,0.12);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); }

nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 64px;
  background: rgba(250,246,241,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; color: var(--text); text-decoration: none; }
.nav-back { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
.nav-back:hover { color: var(--accent); }

.page-header {
  padding: 5rem 8vw 3rem;
  background: var(--bg-dark);
  text-align: center;
}
.page-header .label { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
.page-header h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; color: #f5f0ea; }

.blog-listing {
  padding: 5rem 8vw;
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
}
.blog-card {
  background: white; border: 1px solid var(--border); overflow: hidden;
  transition: all 0.25s; text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
}
.blog-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
.blog-cover { height: 200px; overflow: hidden; }
.blog-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.blog-card:hover .blog-cover img { transform: scale(1.04); }
.blog-cover-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.blog-cover-placeholder.travel { background: linear-gradient(135deg, #4a7c59, #2e5440); }
.blog-cover-placeholder.advocacy { background: linear-gradient(135deg, #c45c2e, #8a3d1e); }
.blog-cover-placeholder.art { background: linear-gradient(135deg, #c9a84c, #8a6e28); }
.blog-cover-placeholder i { font-size: 2rem; color: rgba(255,255,255,0.3); }
.blog-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
.blog-cat { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
.blog-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 0.5rem; }
.blog-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.75rem; }
.blog-excerpt { font-size: 0.85rem; color: var(--text-light); line-height: 1.65; flex: 1; }
.empty-state { grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem; font-size: 0.9rem; }
footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-logo">Manisha Thapa</a>
  <a href="../index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
</nav>
<div class="page-header">
  <div class="label">Writing</div>
  <h1>Field Notes &amp; Stories</h1>
</div>
<div class="blog-listing" id="blog-listing">
  <div class="empty-state">Loading posts...</div>
</div>
<footer>&copy; <span id="yr"></span> Manisha Thapa</footer>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const catIcons = { Travel:'fa-mountain', Advocacy:'fa-fist-raised', Art:'fa-palette', Research:'fa-flask', Reflection:'fa-pen' };
const catCls = { Travel:'travel', Advocacy:'advocacy', Art:'art', Research:'advocacy', Reflection:'travel' };

fetch('index.json')
  .then(r => r.json())
  .then(posts => {
    const sorted = posts.sort((a,b) => new Date(b.date) - new Date(a.date));
    const listing = document.getElementById('blog-listing');
    if (!sorted.length) { listing.innerHTML = '<div class="empty-state">No posts yet. Add entries to <code>blogs/index.json</code>.</div>'; return; }
    listing.innerHTML = sorted.map(post => {
      const cat = post.category || 'Travel';
      const cls = catCls[cat] || 'travel';
      const icon = catIcons[cat] || 'fa-pen';
      const dateStr = post.date ? new Date(post.date).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}) : '';
      return `<a href="${post.slug}.html" class="blog-card">
        <div class="blog-cover">${post.cover ? `<img src="../${post.cover}" alt="${post.title}" onerror="this.parentElement.innerHTML='<div class=\\"blog-cover-placeholder ${cls}\\"><i class=\\"fas ${icon}\\"></i></div>'">` : `<div class="blog-cover-placeholder ${cls}"><i class="fas ${icon}"></i></div>`}</div>
        <div class="blog-body">
          <div class="blog-cat">${cat}</div>
          <div class="blog-title">${post.title}</div>
          <div class="blog-date">${dateStr}</div>
          <div class="blog-excerpt">${post.excerpt}</div>
        </div>
      </a>`;
    }).join('');
  })
  .catch(() => {
    document.getElementById('blog-listing').innerHTML = '<div class="empty-state">No posts found. Add entries to <code>blogs/index.json</code>.</div>';
  });
</script>
</body>
</html>
